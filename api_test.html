<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API Test</title>
<style>
body { background:#0a0e1a; color:#fff; font-family:sans-serif; padding:40px; }
button { background:#3b82f6; border:none; color:#fff; padding:16px 32px; border-radius:10px; font-size:16px; cursor:pointer; margin-bottom:20px; }
#result { background:#111827; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:20px; white-space:pre-wrap; font-size:14px; min-height:100px; }
</style>
</head>
<body>
<h2>AmeriStart API Test</h2>
<p>Click the button to test if Claude AI is responding:</p>
<button onclick="testAPI()">Test API Connection</button>
<div id="result">Result will appear here...</div>

<script>
async function testAPI() {
  const result = document.getElementById('result');
  result.textContent = 'Connecting to Claude AI...';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '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',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        messages: [{ role: 'user', content: 'Say hello in Spanish and English. Be brief.' }]
      })
    });

    result.textContent = 'HTTP Status: ' + response.status + '\n\n';

    if (!response.ok) {
      const err = await response.text();
      result.textContent += 'ERROR: ' + err;
      return;
    }

    const data = await response.json();
    result.textContent += 'SUCCESS!\n\nResponse: ' + data.content[0].text;

  } catch(err) {
    result.textContent = 'FAILED: ' + err.message;
  }
}
</script>
</body>
</html>
